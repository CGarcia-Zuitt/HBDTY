<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HBD TY! 🍮✨</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Quicksand:wght@700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --purin-yellow: #FFF4A3;
            --purin-body: #FFED66;
            --purin-brown: #633923;
            --purin-accent: #FFB347;
        }

        body {
            background-color: var(--purin-yellow);
            background-image: radial-gradient(var(--purin-brown) 1px, transparent 1px);
            background-size: 40px 40px;
            font-family: 'Quicksand', sans-serif;
            height: 100vh;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
        }

        /* Meme Popup */
        #meme-box {
            position: fixed;
            top: 20px;
            right: 20px;
            width: 180px;
            background: white;
            border: 4px solid var(--purin-brown);
            border-radius: 15px;
            padding: 10px;
            box-shadow: 8px 8px 0 var(--purin-accent);
            z-index: 1000;
            display: none;
            text-align: center;
        }

        .card {
            border: 8px solid var(--purin-brown);
            border-radius: 50px;
            box-shadow: 15px 15px 0px var(--purin-accent);
            background: white;
            padding: 40px;
            text-align: center;
            z-index: 10;
            max-width: 450px;
            position: relative;
        }

        .card::before {
            content: '';
            position: absolute;
            top: -35px;
            left: 50%;
            transform: translateX(-50%);
            width: 80px;
            height: 35px;
            background: var(--purin-brown);
            border-radius: 20px 20px 0 0;
        }

        h1 { font-family: 'Fredoka One', cursive; color: var(--purin-brown); }

        #run-button {
            position: relative;
            background-color: var(--purin-brown);
            border: none;
            color: white;
            padding: 15px 30px;
            border-radius: 50px;
            font-weight: 700;
            z-index: 500;
            cursor: pointer;
            box-shadow: 0 4px 0 #4a2b1a;
            transition: transform 0.1s ease, left 0.2s ease, top 0.2s ease;
            white-space: nowrap;
        }

        .confetti {
            position: absolute;
            width: 12px;
            height: 12px;
            animation: fall 3s linear forwards;
            z-index: 999;
        }

        @keyframes fall { to { transform: translateY(110vh) rotate(360deg); } }
    </style>
</head>
<body>

    <div id="meme-box">
        <p id="meme-text" class="m-0 fw-bold">Missed again! 😂</p>
        <div id="meme-emoji" style="font-size: 50px;">🤡</div>
    </div>

    <div style="font-size: 60px; top: 10%; left: 10%; position: fixed;">🐱</div>
    <div style="font-size: 60px; bottom: 10%; right: 10%; position: fixed;">🍮</div>

    <div class="card">
        <h1>HBD TY! 🍮</h1>
        <p>Happy Birthday, Ty! The pudding is waiting...</p>
        
        <div class="mt-5" style="height: 150px; display: flex; align-items: center; justify-content: center;">
            <button id="run-button" onmouseover="move()">CLICK FOR GIFT 🎁</button>
        </div>

        <button class="btn btn-link text-muted mt-4" onclick="win()" style="text-decoration: none; font-size: 0.8rem; color: var(--purin-brown) !important;">
            I surrender, give it here! 🥺
        </button>
    </div>

    <script>
        const puns = ["Too small?", "Too big?", "Wait lang!", "Asa ka pa!", "Try again!", "Muntik na!", "Bleeh! 👅"];
        const emojis = ["🤡", "🤣", "🤪", "👻", "🍮", "🙈", "🤏", "🐘"];
        let count = 0;

        function move() {
            const btn = document.getElementById('run-button');
            const box = document.getElementById('meme-box');
            
            // 1. Move Button
            const x = Math.random() * (window.innerWidth - 200);
            const y = Math.random() * (window.innerHeight - 100);
            btn.style.position = 'fixed';
            btn.style.left = x + 'px';
            btn.style.top = y + 'px';
            
            // 2. Change Size (Scale between 0.5 and 1.8)
            const randomScale = (Math.random() * (1.8 - 0.5) + 0.5).toFixed(2);
            btn.style.transform = `scale(${randomScale})`;
            
            // 3. Change Text & Emoji
            btn.innerHTML = puns[Math.floor(Math.random() * puns.length)];
            document.getElementById('meme-emoji').innerHTML = emojis[Math.floor(Math.random() * emojis.length)];
            
            // 4. Show Meme
            box.style.display = 'block';
            count++;
            setTimeout(() => { box.style.display = 'none'; }, 800);
        }

        function win() {
            document.querySelector('.card').innerHTML = `
                <div style="font-size: 80px;">🎂</div>
                <h2 style="font-family: 'Fredoka One'">TY WINS! 🏆</h2>
                <p class="lead">Happy Birthday, Ty! You chased the button ${count} times!</p>
                <p>Enjoy your special day, you absolute legend! 🍮✨</p>
                <div class="mt-4">
                    <button class="btn btn-dark" style="border-radius: 20px" onclick="location.reload()">Try Again? 🔄</button>
                </div>
            `;
            
            // Confetti
            for(let i=0; i<80; i++) {
                let c = document.createElement('div');
                c.className = 'confetti';
                c.style.left = Math.random() * 100 + 'vw';
                c.style.top = '-20px';
                c.style.backgroundColor = ['#633923', '#FFED66', '#FFB347', '#FFFFFF'][i%4];
                c.style.animationDuration = (Math.random() * 2 + 1) + 's';
                document.body.appendChild(c);
            }
        }
    </script>
</body>
</html>
