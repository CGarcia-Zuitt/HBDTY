<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HBD TY! 🍮✨</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Quicksand:wght@700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --purin-yellow: #FFF4A3;
            --purin-body: #FFED66;
            --purin-brown: #633923;
            --purin-accent: #FFB347;
        }

        body {
            background-color: var(--purin-yellow);
            background-image: radial-gradient(var(--purin-brown) 1px, transparent 1px);
            background-size: 40px 40px;
            font-family: 'Quicksand', sans-serif;
            height: 100vh;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            transition: background-color 0.3s ease;
        }

        /* The Reaction Popup */
        #meme-box {
            position: fixed;
            top: 20px;
            right: 20px;
            width: 180px;
            background: white;
            border: 4px solid var(--purin-brown);
            border-radius: 15px;
            padding: 10px;
            box-shadow: 8px 8px 0 var(--purin-accent);
            z-index: 1000;
            display: none;
            text-align: center;
        }

        .card {
            border: 8px solid var(--purin-brown);
            border-radius: 50px;
            box-shadow: 15px 15px 0px var(--purin-accent);
            background: white;
            padding: 40px;
            text-align: center;
            z-index: 10;
            max-width: 450px;
            position: relative;
        }

        /* Pompompurin Beret */
        .card::before {
            content: '';
            position: absolute;
            top: -35px;
            left: 50%;
            transform: translateX(-50%);
            width: 80px;
            height: 35px;
            background: var(--purin-brown);
            border-radius: 20px 20px 0 0;
        }

        h1 { font-family: 'Fredoka One', cursive; color: var(--purin-brown); margin-bottom: 20px; }

        #run-button {
            position: relative;
            background-color: var(--purin-brown);
            border: none;
            color: white;
            padding: 15px 30px;
            border-radius: 50px;
            font-weight: 700;
            z-index: 500;
            cursor: pointer;
            box-shadow: 0 4px 0 #4a2b1a;
            /* Smooth movement and size scaling */
            transition: transform 0.1s ease, left 0.15s ease, top 0.15s ease;
            white-space: nowrap;
        }

        .confetti {
            position: absolute;
            width: 12px;
            height: 12px;
            animation: fall 3s linear forwards;
            z-index: 999;
        }

        @keyframes fall { to { transform: translateY(110vh) rotate(360deg); } }
    </style>
</head>
<body>

    <div id="meme-box">
        <p id="meme-text" class="m-0 fw-bold">Missed again! 😂</p>
        <div id="meme-emoji" style="font-size: 50px;">🤡</div>
    </div>

    <div style="font-size: 60px; top: 10%; left: 10%; position: fixed; opacity: 0.5;">🐶</div>
    <div style="font-size: 60px; bottom: 10%; right: 10%; position: fixed; opacity: 0.5;">🍮</div>

    <div class="card">
        <h1>HBD TY! 🍮</h1>
        <p>You want your gift? Catch the pudding first! ✨</p>
        
        <div class="mt-5" style="height: 140px; display: flex; align-items: center; justify-content: center;">
            <button id="run-button" onmouseover="doChaos()">CLICK FOR GIFT 🎁</button>
        </div>

        <button class="btn btn-link text-muted mt-4" onclick="win()" style="text-decoration: none; font-size: 0.8rem; color: var(--purin-brown) !important;">
            Suko na ko, give gift na 🥺
        </button>
    </div>

    <script>
        const puns = ["Too small?", "Too big?", "Wait lang!", "Asa ka pa!", "Muntik na!", "Bleeh! 👅", "Takbo!", "Too slow!"];
        const emojis = ["🤡", "🤣", "🤪", "👻", "🍮", "🙈", "🤏", "🐘", "🐕"];
        let count = 0;

        function doChaos() {
            const btn = document.getElementById('run-button');
            const box = document.getElementById('meme-box');
            
            // 1. Move Button randomly
            const x = Math.random() * (window.innerWidth - 200);
            const y = Math.random() * (window.innerHeight - 150);
            btn.style.position = 'fixed';
            btn.style.left = Math.max(10, x) + 'px';
            btn.style.top = Math.max(10, y) + 'px';
            
            // 2. Change Size randomly (Scale from 0.4x to 1.7x)
            const randomScale = (Math.random() * (1.7 - 0.4) + 0.4).toFixed(2);
            btn.style.transform = `scale(${randomScale})`;
            
            // 3. Update Text & Meme Emoji
            btn.innerHTML = puns[Math.floor(Math.random() * puns.length)];
            document.getElementById('meme-emoji').innerHTML = emojis[Math.floor(Math.random() * emojis.length)];
            
            // 4. Show Meme Popup
            box.style.display = 'block';
            count++;

            // Extra Makulit: Background color flicker
            document.body.style.backgroundColor = count % 2 === 0 ? '#FFED66' : '#FFF4A3';

            setTimeout(() => { box.style.display = 'none'; }, 800);
        }

        function win() {
            // Remove the floating background icons for cleaner look
            document.querySelectorAll('div[style*="fixed"]').forEach(el => el.remove());

            document.querySelector('.card').innerHTML = `
                <div style="font-size: 100px; margin-bottom: 10px;">🏆🍮</div>
                <h2 style="font-family: 'Fredoka One'; color: var(--purin-brown);">HAPPY BIRTHDAY TY!</h2>
                <p class="lead">You finally caught it! After <b>${count}</b> failed attempts.</p>
                <p>Enjoy your special day, Ty! You're the MVP! 🥳✨</p>
                <div class="mt-4">
                    <button class="btn btn-dark" style="border-radius: 20px; background: var(--purin-brown);" onclick="location.reload()">Reset Chaos 🔄</button>
                </div>
            `;
            
            // Full screen confetti shower
            const colors = ['#633923', '#FFED66', '#FFB347', '#FFFFFF'];
            for(let i=0; i<80; i++) {
                let c = document.createElement('div');
                c.className = 'confetti';
                c.style.left = Math.random() * 100 + 'vw';
                c.style.top = '-20px';
                c.style.backgroundColor = colors[i % 4];
                c.style.animationDuration = (Math.random() * 2 + 1) + 's';
                document.body.appendChild(c);
            }
        }
    </script>
</body>
</html>
