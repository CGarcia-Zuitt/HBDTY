<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HBD TY! 🍮🤡</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Quicksand:wght@700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --purin-yellow: #FFF4A3;
            --purin-body: #FFED66;
            --purin-brown: #633923;
            --purin-accent: #FFB347;
        }

        body {
            background-color: var(--purin-yellow);
            font-family: 'Quicksand', sans-serif;
            height: 100vh;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            color: var(--purin-brown);
        }

        /* Fixed Meme Popup */
        #meme-box {
            position: fixed;
            top: 20px;
            right: 20px;
            width: 220px;
            background: white;
            border: 4px solid var(--purin-brown);
            border-radius: 15px;
            padding: 8px;
            box-shadow: 8px 8px 0 var(--purin-accent);
            z-index: 1000;
            display: none;
            text-align: center;
            animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes popIn {
            from { transform: scale(0) rotate(-10deg); }
            to { transform: scale(1) rotate(0deg); }
        }

        #meme-img {
            width: 100%;
            height: 150px;
            object-fit: cover;
            border-radius: 8px;
            background: #eee;
        }

        .card {
            border: 8px solid var(--purin-brown);
            border-radius: 40px;
            box-shadow: 12px 12px 0px var(--purin-accent);
            background: rgba(255, 255, 255, 0.98);
            padding: 30px;
            text-align: center;
            z-index: 10;
            max-width: 450px;
            position: relative;
        }

        .card::before {
            content: '';
            position: absolute;
            top: -35px;
            left: 50%;
            transform: translateX(-50%);
            width: 80px;
            height: 35px;
            background: var(--purin-brown);
            border-radius: 15px 15px 0 0;
        }

        h1 { font-family: 'Fredoka One', cursive; color: var(--purin-brown); }

        #run-button {
            position: relative;
            background-color: var(--purin-brown);
            border: none;
            color: white;
            padding: 15px 25px;
            border-radius: 50px;
            font-size: 1.1rem;
            transition: all 0.1s ease;
            z-index: 100;
            cursor: pointer;
            box-shadow: 0 5px 0 #4a2b1a;
        }

        .confetti {
            position: absolute;
            width: 12px;
            height: 12px;
            animation: fall 3s linear forwards;
            z-index: 5;
        }

        @keyframes fall { to { transform: translateY(110vh) rotate(360deg); } }

        .floating-cat {
            position: fixed;
            width: 80px;
            pointer-events: none;
            z-index: 1;
            animation: float 3s ease-in-out infinite alternate;
        }
        @keyframes float { from { transform: translateY(0); } to { transform: translateY(-20px); } }
    </style>
</head>
<body>

    <div id="meme-box">
        <p id="meme-text" style="font-size: 0.8rem; font-weight: bold; margin-bottom: 5px;">MUNTIK NA TY! 😂</p>
        <img src="" id="meme-img" alt="Meme">
    </div>

    <img src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExM3Z5Y2N0Z3I3cXpueXF4eXF4eXF4eXF4eXF4eXF4eXF4eXF4eXF4JnB0PWEmZXA9djFfaW50ZXJuYWxfZ2lmX2J5X2lkJmN0PXM/U6X7Nq8zY0C6W0Xp8x/giphy.gif" class="floating-cat" style="top:10%; left:10%;">
    <img src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExM3Z5Y2N0Z3I3cXpueXF4eXF4eXF4eXF4eXF4eXF4eXF4eXF4eXF4JnB0PWEmZXA9djFfaW50ZXJuYWxfZ2lmX2J5X2lkJmN0PXM/3o72EX5QZ9N9d51dqo/giphy.gif" class="floating-cat" style="bottom:10%; right:10%;">

    <div class="card">
        <h1>HBD TY! 🍮</h1>
        <p class="fw-bold">Will you accept your Pompompurin gift? ✨</p>
        
        <div class="mt-5" style="height: 100px;">
            <button id="run-button" onmouseover="doChaos()">ACCEPT GIFT 🎁</button>
        </div>

        <button class="btn btn-link mt-3" onclick="victory()" style="color: var(--purin-brown); text-decoration: none; font-size: 0.8rem;">
            Okay, I give up... let me win 🥺
        </button>
    </div>

    <script>
        // High-reliability meme links (using direct Giphy/Imgur CDNs)
        const memes = [
            "https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExM3Z5Y2N0Z3I3cXpueXF4eXF4eXF4eXF4eXF4eXF4eXF4eXF4eXF4JnB0PWEmZXA9djFfaW50ZXJuYWxfZ2lmX2J5X2lkJmN0PWc/mlvseq9yvZhba/giphy.gif",
            "https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExM3Z5Y2N0Z3I3cXpueXF4eXF4eXF4eXF4eXF4eXF4eXF4eXF4eXF4JnB0PWEmZXA9djFfaW50ZXJuYWxfZ2lmX2J5X2lkJmN0PWc/vFKqnCdLPNOKc/giphy.gif",
            "https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExM3Z5Y2N0Z3I3cXpueXF4eXF4eXF4eXF4eXF4eXF4eXF4eXF4eXF4JnB0PWEmZXA9djFfaW50ZXJuYWxfZ2lmX2J5X2lkJmN0PWc/3o72EX5QZ9N9d51dqo/giphy.gif",
            "https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExM3Z5Y2N0Z3I3cXpueXF4eXF4eXF4eXF4eXF4eXF4eXF4eXF4eXF4JnB0PWEmZXA9djFfaW50ZXJuYWxfZ2lmX2J5X2lkJmN0PWc/j38Xv4P89ePqFz2A2O/giphy.gif"
        ];

        const catchphrases = ["ASASA TY!", "MUNTIK NA!", "DI MO KAYA!", "BAGAL!", "BLEHHH!", "TY NO!", "BYE BYE!", "NO GIFT!"];
        let count = 0;

        function doChaos() {
            const btn = document.getElementById('run-button');
            const box = document.getElementById('meme-box');
            const img = document.getElementById('meme-img');

            // Move Button
            const x = Math.random() * (window.innerWidth - btn.clientWidth - 40);
            const y = Math.random() * (window.innerHeight - btn.clientHeight - 40);
            btn.style.position = 'fixed';
            btn.style.left = x + 'px';
            btn.style.top = y + 'px';
            btn.innerHTML = catchphrases[Math.floor(Math.random() * catchphrases.length)];

            // Show Meme
            img.src = memes[count % memes.length];
            box.style.display = 'block';
            
            count++;

            setTimeout(() => { box.style.display = 'none'; }, 1500);
        }

        function victory() {
            const card = document.querySelector('.card');
            card.innerHTML = `
                <img src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExM3Z5Y2N0Z3I3cXpueXF4eXF4eXF4eXF4eXF4eXF4eXF4eXF4eXF4JnB0PWEmZXA9djFfaW50ZXJuYWxfZ2lmX2J5X2lkJmN0PWc/xT0xeMA62E1XPRvYfC/giphy.gif" class="img-fluid rounded mb-3" style="border: 4px solid var(--purin-brown)">
                <h2>HAPPY BIRTHDAY TY! 🍮🏆</h2>
                <p>You tried ${count} times! You deserve all the pudding today!</p>
                <button class="btn mt-3" style="background: var(--purin-brown); color:white; border-radius:20px" onclick="location.reload()">Reset Chaos</button>
            `;
            makeConfetti();
        }

        function makeConfetti() {
            const colors = ['#633923', '#FFED66', '#FFB347'];
            for(let i=0; i<100; i++) {
                const c = document.createElement('div');
                c.className = 'confetti';
                c.style.left = Math.random() * 100 + 'vw';
                c.style.top = '-10px';
                c.style.backgroundColor = colors[Math.floor(Math.random()*3)];
                c.style.animationDuration = (Math.random()*3 + 2) + 's';
                document.body.appendChild(c);
            }
        }
    </script>
</body>
</html>
