<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HBD TY! 🍮✨</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Quicksand:wght@700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --purin-yellow: #FFF4A3;
            --purin-body: #FFED66;
            --purin-brown: #633923;
            --purin-accent: #FFB347;
        }

        body {
            background-color: var(--purin-yellow);
            background-image: radial-gradient(var(--purin-brown) 1px, transparent 1px);
            background-size: 40px 40px;
            font-family: 'Quicksand', sans-serif;
            height: 100vh;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
        }

        .card {
            border: 8px solid var(--purin-brown);
            border-radius: 50px;
            box-shadow: 15px 15px 0px var(--purin-accent);
            background: white;
            padding: 40px;
            text-align: center;
            z-index: 10;
            max-width: 450px;
            position: relative;
        }

        /* Pompompurin Hat */
        .card::before {
            content: '';
            position: absolute;
            top: -35px;
            left: 50%;
            transform: translateX(-50%);
            width: 80px;
            height: 35px;
            background: var(--purin-brown);
            border-radius: 20px 20px 0 0;
        }

        h1 { font-family: 'Fredoka One', cursive; color: var(--purin-brown); }

        #run-button {
            position: fixed; /* Keep it fixed so it can fly anywhere */
            background-color: var(--purin-brown);
            border: none;
            color: white;
            border-radius: 50px;
            font-weight: 700;
            z-index: 500;
            cursor: pointer;
            box-shadow: 0 4px 0 #4a2b1a;
            transition: all 0.15s ease-out; /* Smooth transition for size and position */
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 10px 20px;
        }

        #meme-box {
            position: fixed;
            top: 20px;
            right: 20px;
            background: white;
            border: 4px solid var(--purin-brown);
            border-radius: 15px;
            padding: 15px;
            z-index: 1000;
            display: none;
            box-shadow: 5px 5px 0 var(--purin-accent);
        }

        .confetti {
            position: absolute;
            width: 10px;
            height: 10px;
            z-index: 999;
            animation: fall 3s linear forwards;
        }

        @keyframes fall { to { transform: translateY(110vh) rotate(360deg); } }
    </style>
</head>
<body>

    <div id="meme-box">
        <div id="meme-emoji" style="font-size: 50px;">🤡</div>
        <p class="m-0 fw-bold">Ty! Slow mo? 😂</p>
    </div>

    <div style="position:fixed; top:5%; left:5%; font-size: 50px; opacity: 0.3;">🐶</div>
    <div style="position:fixed; bottom:5%; right:5%; font-size: 50px; opacity: 0.3;">🍮</div>

    <div class="card">
        <h1>HAPPY BIRTHDAY TY! 🍮</h1>
        <p>Catch the pudding to see your message!</p>
        
        <button id="run-button" onmouseover="chaosMode()" style="top: 60%; left: 45%;">CLICK ME 🎁</button>

        <div style="height: 120px;"></div> <button class="btn btn-link text-muted mt-4" onclick="victory()" style="text-decoration: none; font-size: 0.8rem; color: var(--purin-brown) !important;">
            I surrender, I'm too slow 🥺
        </button>
    </div>

    <script>
        const msgs = ["Wala!", "Bleeh!", "Almost!", "Asa!", "Again!", "Ty! 🤣"];
        const emojis = ["🤡", "🤣", "🤪", "👻", "🍮", "🤏", "🐘"];
        let count = 0;

        function chaosMode() {
            const btn = document.getElementById('run-button');
            const box = document.getElementById('meme-box');

            // 1. New Position
            const newX = Math.random() * (window.innerWidth - 250);
            const newY = Math.random() * (window.innerHeight - 150);
            
            // 2. New Sizes (Direct Width/Height for guaranteed change)
            const randomSize = Math.floor(Math.random() * (250 - 60 + 1)) + 60; // Min 60px, Max 250px
            const fontSize = Math.max(12, randomSize / 8);

            // Apply styles directly
            btn.style.left = newX + "px";
            btn.style.top = newY + "px";
            btn.style.width = randomSize + "px";
            btn.style.height = (randomSize / 2) + "px";
            btn.style.fontSize = fontSize + "px";

            // 3. Update Text
            btn.innerHTML = msgs[Math.floor(Math.random() * msgs.length)];
            
            // 4. Show Meme Popup
            document.getElementById('meme-emoji').innerHTML = emojis[Math.floor(Math.random() * emojis.length)];
            box.style.display = 'block';
            count++;
            
            setTimeout(() => { box.style.display = 'none'; }, 800);
        }

        function victory() {
            // Clear screen elements
            document.getElementById('run-button').style.display = 'none';
            
            document.querySelector('.card').innerHTML = `
                <div style="font-size: 80px;">🎂🎉</div>
                <h2 style="font-family: 'Fredoka One'; color: var(--purin-brown);">HAPPY BIRTHDAY TY!</h2>
                <p class="lead">You missed the button <b>${count}</b> times!</p>
                <p>May your year be as sweet as Pompompurin's pudding. Enjoy your day! 🍮✨</p>
                <button class="btn btn-dark mt-3" style="border-radius: 20px; background: var(--purin-brown);" onclick="location.reload()">Reset Chaos 🔄</button>
            `;

            // Confetti Shower
            for(let i=0; i<100; i++) {
                let c = document.createElement('div');
                c.className = 'confetti';
                c.style.left = Math.random() * 100 + 'vw';
                c.style.top = '-20px';
                c.style.backgroundColor = ['#633923', '#FFED66', '#FFB347', '#FFFFFF'][i%4];
                c.style.animationDuration = (Math.random() * 2 + 1) + 's';
                document.body.appendChild(c);
            }
        }
    </script>
</body>
</html>
